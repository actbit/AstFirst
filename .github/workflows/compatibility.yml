name: compatibility

# 各 SDK (.NET 6/8/10) で AstFirst の Source Generator + Runtime が動くか検証。
# AstFirst.Generator は Microsoft.CodeAnalysis 4.13.0 でビルドしているため、
# 古い SDK (Roslyn 4.x) での互換性を matrix で確認する。
on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Prepare local package feed
        run: |
          mkdir -p artifacts/packages
          dotnet pack src/AstFirst.Core/AstFirst.Core.csproj -c Release -o artifacts/packages
          dotnet pack src/AstFirst.Runtime/AstFirst.Runtime.csproj -c Release -o artifacts/packages
      - name: Run tests
        run: dotnet test AstFirst.slnx -c Release --nologo

  compat:
    name: ${{ matrix.sdk }} / ${{ matrix.framework }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: '6.0.x'
            framework: net6.0
          - sdk: '8.0.x'
            framework: net8.0
          - sdk: '10.0.x'
            framework: net10.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.sdk }}

      - name: Pack Core/Runtime to local feed
        # Generator が AstFirst.Runtime ($(Version)) に PackageReference するため、
        # 事前に Core/Runtime を local フィード (artifacts/packages) に出力して解決可能にする。
        run: |
          mkdir -p artifacts/packages
          dotnet pack src/AstFirst.Core/AstFirst.Core.csproj -c Release -o artifacts/packages
          dotnet pack src/AstFirst.Runtime/AstFirst.Runtime.csproj -c Release -o artifacts/packages

      - name: Build & run compat project
        run: dotnet run --project tests/AstFirst.Compat --framework ${{ matrix.framework }} -c Release
